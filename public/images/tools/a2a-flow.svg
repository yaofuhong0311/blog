<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">
  <rect width="1200" height="560" rx="20" fill="#f2f6fa"/>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#3a6491"/>
    </marker>
    <marker id="ar" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#c97b5a"/>
    </marker>
  </defs>

  <!-- 用户输入 -->
  <rect x="60" y="60" width="220" height="70" rx="12" fill="#5b88b0"/>
  <text x="170" y="90" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="700">用户输入项目路径</text>
  <text x="170" y="114" text-anchor="middle" fill="#eaf2f9" font-size="13">"分析 xx 项目的支付模块架构"</text>

  <!-- Orchestrator -->
  <rect x="380" y="60" width="220" height="70" rx="12" fill="#3a6491"/>
  <text x="490" y="90" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="700">Orchestrator</text>
  <text x="490" y="114" text-anchor="middle" fill="#eaf2f9" font-size="13">经 Registry 发现并路由各 Agent</text>

  <line x1="280" y1="95" x2="375" y2="95" stroke="#3a6491" stroke-width="2.5" marker-end="url(#a)"/>

  <!-- 三个 Agent -->
  <g text-anchor="middle">
    <rect x="90" y="230" width="300" height="120" rx="14" fill="#24476b"/>
    <text x="240" y="268" fill="#ffffff" font-size="18" font-weight="700">CodeReader Agent</text>
    <text x="240" y="298" fill="#eaf2f9" font-size="14">
      <tspan x="240">扫描目录结构</tspan>
      <tspan x="240" dy="22">按关键词搜索代码</tspan>
    </text>

    <rect x="450" y="230" width="300" height="120" rx="14" fill="#24476b"/>
    <text x="600" y="268" fill="#ffffff" font-size="18" font-weight="700">Analyst Agent</text>
    <text x="600" y="298" fill="#eaf2f9" font-size="14">
      <tspan x="600">基于代码写架构分析报告</tspan>
      <tspan x="600" dy="22">并负责审核图表准确性</tspan>
    </text>

    <rect x="810" y="230" width="300" height="120" rx="14" fill="#24476b"/>
    <text x="960" y="268" fill="#ffffff" font-size="18" font-weight="700">Diagrammer Agent</text>
    <text x="960" y="298" fill="#eaf2f9" font-size="14">
      <tspan x="960">生成 Mermaid 架构图</tspan>
      <tspan x="960" dy="22">被打回时按意见修改</tspan>
    </text>
  </g>

  <!-- 协作顺序 -->
  <line x1="490" y1="130" x2="245" y2="225" stroke="#3a6491" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="330" y="175" font-size="14" fill="#3f5d7d">① 读代码</text>
  <line x1="390" y1="290" x2="445" y2="290" stroke="#3a6491" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="418" y="278" text-anchor="middle" font-size="14" fill="#3f5d7d">②</text>
  <line x1="750" y1="290" x2="805" y2="290" stroke="#3a6491" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="778" y="278" text-anchor="middle" font-size="14" fill="#3f5d7d">③</text>

  <!-- 审核回路 -->
  <path d="M 960 350 C 960 415 600 415 600 355" fill="none" stroke="#c97b5a" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="780" y="420" text-anchor="middle" font-size="14" fill="#a35c3e" font-weight="600">④ 图表交回审核，不准确则打回重画</text>

  <!-- 产出 -->
  <rect x="450" y="460" width="300" height="70" rx="12" fill="#5b88b0"/>
  <text x="600" y="490" text-anchor="middle" fill="#ffffff" font-size="17" font-weight="700">最终产出</text>
  <text x="600" y="514" text-anchor="middle" fill="#eaf2f9" font-size="13">中文分析报告 + 架构图 + 可下载 HTML</text>
  <line x1="600" y1="425" x2="600" y2="455" stroke="#3a6491" stroke-width="2.5" marker-end="url(#a)"/>

  <!-- 协议说明 -->
  <text x="60" y="530" font-size="14" fill="#6b87a3">Agent 之间通过 A2A 协议互相发现、传递消息、协商结果——每一步调用在界面实时可见</text>
</svg>
