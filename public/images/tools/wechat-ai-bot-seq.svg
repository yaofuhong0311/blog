<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">
  <rect width="1200" height="700" rx="20" fill="#f2f6fa"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#3a6491"/>
    </marker>
    <marker id="arrback" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#7fa3c4"/>
    </marker>
  </defs>

  <!-- 生命线头部 -->
  <g text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">
    <rect x="60"  y="40" width="170" height="52" rx="10" fill="#5b88b0"/><text x="145"  y="72">用户（微信群）</text>
    <rect x="300" y="40" width="170" height="52" rx="10" fill="#5b88b0"/><text x="385" y="72">wkteam 网关</text>
    <rect x="540" y="40" width="170" height="52" rx="10" fill="#3a6491"/><text x="625" y="72">FastAPI 服务</text>
    <rect x="780" y="40" width="170" height="52" rx="10" fill="#3a6491"/><text x="865" y="72">磁盘记忆</text>
    <rect x="1010" y="40" width="170" height="52" rx="10" fill="#24476b"/><text x="1095" y="72">Claude Agent SDK</text>
  </g>

  <!-- 生命线 -->
  <g stroke="#b9cbdc" stroke-width="2" stroke-dasharray="6 6">
    <line x1="145" y1="92" x2="145" y2="650"/>
    <line x1="385" y1="92" x2="385" y2="650"/>
    <line x1="625" y1="92" x2="625" y2="650"/>
    <line x1="865" y1="92" x2="865" y2="650"/>
    <line x1="1095" y1="92" x2="1095" y2="650"/>
  </g>

  <!-- 消息 -->
  <g font-size="15" fill="#2c4a68">
    <line x1="145" y1="140" x2="380" y2="140" stroke="#3a6491" stroke-width="2" marker-end="url(#arr)"/>
    <text x="262" y="130" text-anchor="middle">① 群消息（@bot）</text>

    <line x1="385" y1="185" x2="620" y2="185" stroke="#3a6491" stroke-width="2" marker-end="url(#arr)"/>
    <text x="502" y="175" text-anchor="middle">② webhook 推送</text>
    <text x="502" y="207" text-anchor="middle" font-size="13" fill="#6b87a3">写入实时消息缓冲，下载图片/文件</text>

    <line x1="625" y1="250" x2="860" y2="250" stroke="#3a6491" stroke-width="2" marker-end="url(#arr)"/>
    <text x="742" y="240" text-anchor="middle">③ 加载用户画像 + 群历史</text>

    <line x1="860" y1="290" x2="630" y2="290" stroke="#7fa3c4" stroke-width="2" marker-end="url(#arrback)"/>
    <text x="745" y="280" text-anchor="middle" font-size="13" fill="#6b87a3">上下文</text>

    <line x1="625" y1="335" x2="1090" y2="335" stroke="#3a6491" stroke-width="2" marker-end="url(#arr)"/>
    <text x="857" y="325" text-anchor="middle">④ 上下文 + 问题</text>

    <rect x="1030" y="355" width="130" height="46" rx="8" fill="#dce8f2"/>
    <text x="1095" y="374" text-anchor="middle" font-size="13" fill="#3f5d7d">推理 + 调用工具</text>
    <text x="1095" y="392" text-anchor="middle" font-size="13" fill="#3f5d7d">WebFetch / Bash…</text>

    <line x1="1090" y1="430" x2="630" y2="430" stroke="#7fa3c4" stroke-width="2" marker-end="url(#arrback)"/>
    <text x="857" y="420" text-anchor="middle" font-size="13" fill="#6b87a3">回复内容</text>

    <line x1="620" y1="470" x2="390" y2="470" stroke="#3a6491" stroke-width="2" marker-end="url(#arr)"/>
    <line x1="380" y1="505" x2="150" y2="505" stroke="#3a6491" stroke-width="2" marker-end="url(#arr)"/>
    <text x="500" y="460" text-anchor="middle">⑤ 发送回复</text>
    <text x="262" y="495" text-anchor="middle">⑥ 群内送达</text>
  </g>

  <!-- 异步维护块 -->
  <rect x="560" y="545" width="600" height="120" rx="12" fill="#e4edf5" stroke="#b9cbdc" stroke-width="1.5"/>
  <text x="585" y="575" font-size="15" font-weight="700" fill="#3f5d7d">⑦ 应答后异步维护（并行）</text>
  <g font-size="14" fill="#4a6784">
    <text x="585" y="602">· 问答追加进 history.jsonl</text>
    <text x="585" y="626">· 让模型提取用户新事实，更新 users/{wxid}.md 画像</text>
    <text x="585" y="650">· 历史超过 100 条时，压缩最旧 80 条为摘要</text>
  </g>
</svg>
