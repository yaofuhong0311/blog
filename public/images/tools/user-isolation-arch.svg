<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">
  <rect width="1200" height="560" rx="20" fill="#f2f6fa"/>
  <defs>
    <marker id="m" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#3a6491"/>
    </marker>
  </defs>

  <!-- React -->
  <rect x="60" y="120" width="230" height="150" rx="14" fill="#5b88b0"/>
  <text x="175" y="165" text-anchor="middle" fill="#ffffff" font-size="19" font-weight="700">React SPA</text>
  <text x="175" y="196" text-anchor="middle" fill="#eaf2f9" font-size="14">
    <tspan x="175">聊天界面 · 流式渲染</tspan>
    <tspan x="175" dy="24">工具调用过程可视化</tspan>
  </text>

  <!-- FastAPI -->
  <rect x="430" y="90" width="280" height="210" rx="14" fill="#3a6491"/>
  <text x="570" y="130" text-anchor="middle" fill="#ffffff" font-size="19" font-weight="700">FastAPI 中间层</text>
  <text x="570" y="162" text-anchor="middle" fill="#eaf2f9" font-size="14">
    <tspan x="570">JWT 认证 · bcrypt 密码</tspan>
    <tspan x="570" dy="24">把每个用户路由到专属 Agent</tspan>
    <tspan x="570" dy="24">双向代理 WebSocket 流</tspan>
  </text>
  <text x="570" y="282" text-anchor="middle" fill="#b9cbdc" font-size="13">前端从不直连 AI 引擎</text>

  <!-- OpenClaw -->
  <rect x="850" y="60" width="290" height="300" rx="14" fill="#24476b"/>
  <text x="995" y="100" text-anchor="middle" fill="#ffffff" font-size="19" font-weight="700">OpenClaw Gateway（AI 引擎）</text>
  <g text-anchor="middle" font-size="14">
    <rect x="880" y="125" width="230" height="60" rx="10" fill="#3a6491"/>
    <text x="995" y="150" fill="#ffffff" font-weight="600">用户 A → Agent A</text>
    <text x="995" y="172" fill="#b9cbdc" font-size="12">独立会话 · 独立历史 · 独立工作区</text>
    <rect x="880" y="200" width="230" height="60" rx="10" fill="#3a6491"/>
    <text x="995" y="225" fill="#ffffff" font-weight="600">用户 B → Agent B</text>
    <text x="995" y="247" fill="#b9cbdc" font-size="12">彼此隔离，数据不串</text>
    <rect x="880" y="275" width="230" height="60" rx="10" fill="#3a6491"/>
    <text x="995" y="300" fill="#ffffff" font-weight="600">用户 C → Agent C</text>
    <text x="995" y="322" fill="#b9cbdc" font-size="12">注册即分配专属 agent_id</text>
  </g>

  <!-- PostgreSQL -->
  <rect x="430" y="390" width="280" height="110" rx="14" fill="#7fa3c4"/>
  <text x="570" y="428" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">PostgreSQL</text>
  <text x="570" y="458" text-anchor="middle" fill="#eef5fa" font-size="14">
    <tspan x="570">只存元数据：账号 / 会话列表 / session ID</tspan>
    <tspan x="570" dy="22">消息正文由 AI 引擎的会话存储持有</tspan>
  </text>

  <!-- 连线 -->
  <line x1="290" y1="195" x2="425" y2="195" stroke="#3a6491" stroke-width="2.5" marker-end="url(#m)"/>
  <line x1="425" y1="225" x2="290" y2="225" stroke="#3a6491" stroke-width="2.5" marker-end="url(#m)"/>
  <text x="357" y="182" text-anchor="middle" font-size="14" fill="#3f5d7d" font-weight="600">WebSocket</text>

  <line x1="710" y1="195" x2="845" y2="195" stroke="#3a6491" stroke-width="2.5" marker-end="url(#m)"/>
  <line x1="845" y1="225" x2="710" y2="225" stroke="#3a6491" stroke-width="2.5" marker-end="url(#m)"/>
  <text x="777" y="182" text-anchor="middle" font-size="14" fill="#3f5d7d" font-weight="600">WebSocket</text>

  <line x1="570" y1="300" x2="570" y2="385" stroke="#3a6491" stroke-width="2.5" marker-end="url(#m)"/>
  <text x="640" y="348" text-anchor="middle" font-size="13" fill="#6b87a3">SQLAlchemy async</text>

  <text x="60" y="530" font-size="14" fill="#6b87a3">断线自动重连（指数退避）· WebSocket 连接时会话列表加载与 AI 握手并行，降低感知延迟</text>
</svg>
