<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8aa3bd"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a80b8"/>
    </marker>
  </defs>

  <rect width="1200" height="440" rx="20" fill="#f2f6fa"/>

  <!-- 主流程：唯一的视觉重心 -->
  <g text-anchor="middle">
    <rect x="30" y="150" width="200" height="96" rx="16" fill="#3a6491"/>
    <text x="130" y="192" fill="#ffffff" font-size="24" font-weight="700">brainstorm</text>
    <text x="130" y="222" fill="#c9dced" font-size="15">对齐需求，别抢跑</text>

    <rect x="270" y="150" width="180" height="96" rx="16" fill="#3a6491"/>
    <text x="360" y="192" fill="#ffffff" font-size="24" font-weight="700">plan</text>
    <text x="360" y="222" fill="#c9dced" font-size="15">结构化实施计划</text>

    <rect x="490" y="150" width="200" height="96" rx="16" fill="#3a6491"/>
    <text x="590" y="192" fill="#ffffff" font-size="24" font-weight="700">execute</text>
    <text x="590" y="222" fill="#c9dced" font-size="15">三层防御全程在线</text>

    <rect x="730" y="150" width="230" height="96" rx="16" fill="#24476b"/>
    <text x="845" y="192" fill="#ffffff" font-size="24" font-weight="700">staged-verify</text>
    <text x="845" y="222" fill="#c9dced" font-size="15">四道质量门</text>

    <rect x="1000" y="150" width="170" height="96" rx="16" fill="#6c95bd"/>
    <text x="1085" y="192" fill="#ffffff" font-size="24" font-weight="700">交付</text>
    <text x="1085" y="222" fill="#dbe8f4" font-size="15">边界套件入库</text>
  </g>

  <g stroke="#8aa3bd" stroke-width="3" fill="none">
    <line x1="230" y1="198" x2="262" y2="198" marker-end="url(#arrow)"/>
    <line x1="450" y1="198" x2="482" y2="198" marker-end="url(#arrow)"/>
    <line x1="690" y1="198" x2="722" y2="198" marker-end="url(#arrow)"/>
    <line x1="960" y1="198" x2="992" y2="198" marker-end="url(#arrow)"/>
  </g>

  <!-- 次要信息①：左移（上方，浅色小字） -->
  <path d="M 845 150 C 845 70 360 66 360 142" stroke="#4a80b8" stroke-width="2" stroke-dasharray="7 6" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="602" y="76" font-size="15" fill="#4a80b8" text-anchor="middle">左移：写代码之前，先用黑盒轨出一份契约清单当施工图</text>

  <!-- 次要信息②：经验回流（下方，浅色小字） -->
  <path d="M 1085 246 C 1085 350 130 350 130 254" stroke="#8aa3bd" stroke-width="2" stroke-dasharray="7 6" fill="none" marker-end="url(#arrow)"/>
  <text x="602" y="366" font-size="15" fill="#7a92ab" text-anchor="middle">经验回流：踩坑记录 → 蒸馏 → 写回规则/skill，下次 session 自动加载</text>
</svg>
