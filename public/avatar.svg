<svg xmlns="http://www.w3.org/2000/svg" width="480" height="480" viewBox="0 0 480 480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f8cff"/>
      <stop offset="55%" stop-color="#5b6cf0"/>
      <stop offset="100%" stop-color="#7a4fe0"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#8fd0ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8fd0ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1a1f4a" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="480" height="480" fill="url(#bg)"/>

  <!-- 背景装饰：圆与弧线 -->
  <circle cx="400" cy="70" r="130" fill="#ffffff" fill-opacity="0.07"/>
  <circle cx="60" cy="430" r="160" fill="#ffffff" fill-opacity="0.06"/>
  <circle cx="420" cy="420" r="70" fill="url(#glow)" opacity="0.5"/>
  <path d="M -20 330 Q 140 240 300 320 T 520 280" stroke="#ffffff" stroke-opacity="0.18" stroke-width="3" fill="none"/>
  <path d="M -20 370 Q 150 285 310 360 T 520 320" stroke="#ffffff" stroke-opacity="0.10" stroke-width="3" fille="none" fill="none"/>

  <!-- 代码括号装饰 -->
  <text x="74" y="180" font-family="Menlo, Monaco, monospace" font-size="72" font-weight="700"
        fill="#aee3ff" fill-opacity="0.85">&lt;</text>
  <text x="360" y="392" font-family="Menlo, Monaco, monospace" font-size="72" font-weight="700"
        fill="#aee3ff" fill-opacity="0.85">/&gt;</text>

  <!-- 主字 -->
  <text x="240" y="272" text-anchor="middle" dominant-baseline="middle" filter="url(#soft)"
        font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif"
        font-size="200" font-weight="700" fill="#ffffff">福</text>
</svg>
